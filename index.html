<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HighSport | Iniciar sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="brand-lockup brand-lockup--login">
        <div class="brand-logo brand-logo--shadow"><span>HIGH</span>SPORT</div>
        <p class="brand-subtitle">Sistema de inventario deportivo</p>
      </section>

      <section class="auth-card">
        <h1>Iniciar sesión</h1>
        <form class="form-stack">
          <label for="usuario">USUARIO</label>
          <input id="usuario" type="email" placeholder="tu@correo.com" />

          <label for="contrasena">CONTRASEÑA</label>
          <input id="contrasena" type="password" placeholder="•••••••••••" />

          <a class="btn btn-primary btn-full" href="panel.html">Entrar</a>
        </form>
        <p class="auth-link">
          ¿No tienes cuenta aún? <a href="registro-usuario.html">Regístrate</a>
        </p>
      </section>
    </main>

    <footer class="site-footer site-footer--transparent">
      © 2026 High Sport. Todos los derechos reservados. |
      <a href="#">Política de privacidad</a> |
      <a href="#">Términos y condiciones</a> | <a href="#">Soporte</a> |
      Contacto: soporte@highsport.com
    </footer>
  </body>
</html>
